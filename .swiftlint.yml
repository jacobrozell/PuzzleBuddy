included:
  - Puzzle Buddy
  - Puzzle BuddyTests
  - Puzzle BuddyUITests

opt_in_rules:
  - force_unwrapping

force_unwrapping:
  severity: warning

line_length:
  warning: 200
  error: 300
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 900

type_body_length:
  warning: 400
  error: 700

function_body_length:
  warning: 80
  error: 150

custom_rules:
  no_print_statements:
    included: "Puzzle Buddy/.*\\.swift"
    name: No Print Statements
    regex: '^\s*print\('
    message: "Use AppLog instead of print() in production code."
    severity: warning
