name: PuzzleBuddy
attributes:
  ORGANIZATIONNAME: Jacob Rozell
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
options:
  minimumXcodeGenVersion: 2.44.0
  developmentLanguage: en
  bundleIdPrefix: com.jacobrozell
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 7JT2JB89AV
    CODE_SIGN_STYLE: Automatic
targets:
  PuzzleBuddy:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/README.md"
      - path: App/Resources
        buildPhase: resources
      - path: GoogleService-Info.plist
        type: file
        buildPhase: resources
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
    postBuildScripts:
      - name: Firebase Crashlytics
        script: |
          "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
        inputFiles:
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Resources/DWARF/$(TARGET_NAME)
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Info.plist
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)
    settings:
      base:
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.Puzzle-Buddy
        PRODUCT_MODULE_NAME: PuzzleBuddy
        INFOPLIST_KEY_CFBundleDisplayName: Puzzle Buddy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_NSCameraUsageDescription: Puzzle Buddy uses the camera to photograph puzzle boxes and scan barcodes for faster cataloging and duplicate checks.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Puzzle Buddy uses your photo library so you can attach puzzle box photos to your collection entries.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CODE_SIGN_ENTITLEMENTS: App/PuzzleBuddy.entitlements
        DEVELOPMENT_ASSET_PATHS: '"App/Preview Content"'
        ENABLE_PREVIEWS: YES
        CURRENT_PROJECT_VERSION: 3
        MARKETING_VERSION: 1.0.0
    info:
      path: Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "2"
        FirebaseAppDelegateProxyEnabled: false
        UILaunchStoryboardName: LaunchScreen
    scheme:
      testTargets:
        - AppTests
        - AppUITests
  AppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AppTests
    resources:
      - path: AppTests/Fixtures
    dependencies:
      - target: PuzzleBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.Puzzle-BuddyTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PuzzleBuddy.app/PuzzleBuddy"
        BUNDLE_LOADER: "$(TEST_HOST)"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        CURRENT_PROJECT_VERSION: 3
        MARKETING_VERSION: 1.0.0
  AppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AppUITests
    dependencies:
      - target: PuzzleBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.Puzzle-BuddyUITests
        TEST_TARGET_NAME: PuzzleBuddy
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        CURRENT_PROJECT_VERSION: 3
        MARKETING_VERSION: 1.0.0
